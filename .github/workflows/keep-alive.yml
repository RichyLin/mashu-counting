name: Supabase Keep-Alive

on:
  schedule:
    # 每5天执行一次（UTC 时间 08:00），远低于 Supabase 7天暂停阈值
    - cron: '0 8 */5 * *'
  workflow_dispatch: # 支持手动触发

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Supabase
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            "https://stqabvzqxyddlvdblzwv.supabase.co/rest/v1/rooms?select=id&limit=1" \
            -H "apikey: ${{ secrets.SUPABASE_ANON_KEY }}" \
            -H "Authorization: Bearer ${{ secrets.SUPABASE_ANON_KEY }}")
          echo "Supabase response: $STATUS"
          if [ "$STATUS" != "200" ]; then
            echo "Warning: unexpected status $STATUS"
            exit 1
          fi
          echo "Keep-alive ping successful"
