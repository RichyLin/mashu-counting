<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>麻薯计分</title>
  <link href="https://fonts.googleapis.com/css2?family=ZCOOL+KuaiLe&family=Fredoka:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --matcha:     #7AAB8A;
      --matcha-d:   #5A8A6A;
      --matcha-l:   #B8D4C0;
      --mochi:      #F5F0E8;
      --pink:       #E8A0A8;
      --brown:      #4A3728;
      --gold:       #F0C84A;
      --gold-d:     #E8A84A;
      --green-plus: #6DB88A;
      --red-minus:  #E87070;
      --gray-dis:   #D4C4B0;
      --text:       #4A3728;
      --text-dim:   rgba(74,55,40,0.5);
      --text-light: rgba(74,55,40,0.28);
      --shadow:     rgba(74,55,40,0.12);
    }

    html, body {
      height: 100%;
      background: #C8BFB0;
      font-family: 'ZCOOL KuaiLe', 'PingFang SC', cursive;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    /* ── App shell ── */
    #app {
      width: 375px;
      height: 812px;
      border-radius: 44px;
      border: 10px solid #8A7D70;
      box-shadow: 0 0 0 1.5px #7A6D60, 0 40px 80px rgba(74,55,40,0.3), inset 0 0 0 1px rgba(255,255,255,0.4);
      overflow: hidden;
      position: relative;
      background: var(--mochi);
    }
    #app::before {
      content: '';
      position: absolute;
      top: 0; left: 50%; transform: translateX(-50%);
      width: 110px; height: 28px;
      background: #8A7D70;
      border-radius: 0 0 18px 18px;
      z-index: 9999;
      pointer-events: none;
    }

    /* ── Pages ── */
    .page {
      position: absolute;
      inset: 0;
      display: none;
      flex-direction: column;
    }
    .page.active { display: flex; }

    /* ═══════════════════════════════
       PAGE: ENTRY
    ═══════════════════════════════ */
    #page-entry {
      background: var(--mochi);
      align-items: center;
      justify-content: center;
      padding: 70px 32px 52px;
      overflow: hidden;
    }
    #page-entry::before {
      content: '';
      position: absolute; inset: 0;
      background: radial-gradient(ellipse 70% 55% at 50% 35%, rgba(184,212,192,0.55) 0%, transparent 100%);
      pointer-events: none;
    }
    .deco { position: absolute; border-radius: 50%; border: 1.5px dashed rgba(122,171,138,0.2); }
    .d1 { width: 240px; height: 240px; top: -80px; right: -70px; }
    .d2 { width: 160px; height: 160px; bottom: 120px; left: -55px; }

    .ip-logo { width: 120px; height: 130px; margin: 0 auto 16px; }
    .ip-logo img { width: 100%; height: 100%; object-fit: contain; }
    .brand-name { font-size: 34px; color: var(--matcha-d); letter-spacing: 0.22em; text-align: center; margin-bottom: 4px; text-shadow: 0 1px 0 rgba(255,255,255,0.8); }
    .brand-sub { font-size: 12px; color: var(--text-dim); letter-spacing: 0.25em; text-align: center; margin-bottom: 52px; }

    .room-label-txt { font-size: 12px; color: var(--text-dim); letter-spacing: 0.2em; text-align: center; margin-bottom: 12px; }
    .room-input-box {
      width: 100%; background: #FFFFFF;
      border: 2px solid var(--brown); border-radius: 16px;
      padding: 18px; font-size: 38px; color: var(--brown);
      text-align: center; letter-spacing: 0.5em;
      font-family: 'Fredoka', sans-serif; font-weight: 700;
      margin-bottom: 14px;
      box-shadow: 0 4px 12px var(--shadow);
      outline: none;
    }
    .room-input-box:focus { border-color: var(--matcha); }
    /* remove number input spinners */
    input[type=number]::-webkit-inner-spin-button,
    input[type=number]::-webkit-outer-spin-button { -webkit-appearance: none; margin: 0; }
    input[type=number] { -moz-appearance: textfield; }
    .entry-btn {
      width: 100%; padding: 18px;
      background: linear-gradient(160deg, var(--matcha) 0%, var(--matcha-d) 100%);
      border: 2px solid var(--brown); border-radius: 16px;
      color: #FFFFFF; font-size: 18px; font-family: 'ZCOOL KuaiLe', cursive;
      letter-spacing: 0.22em;
      box-shadow: 0 4px 12px var(--shadow), 0 2px 0 var(--brown);
      cursor: pointer; position: relative;
    }
    .entry-btn:active { transform: translateY(1px); }
    .entry-btn-secondary {
      background: #fff;
      color: var(--brown);
      box-shadow: 0 2px 8px var(--shadow), 0 2px 0 var(--brown);
    }
    .entry-note { margin-top: 16px; font-size: 12px; color: var(--text-light); text-align: center; }
    .entry-error { min-height: 20px; font-size: 12px; color: var(--red-minus); text-align: center; margin: -4px 0 10px; }
    .entry-back { margin-top: 16px; font-size: 13px; color: var(--matcha-d); text-align: center; cursor: pointer; text-decoration: underline; text-underline-offset: 3px; }
    .exit-room-btn {
      width: 100%; padding: 16px;
      background: #fff; border: 2px solid var(--brown);
      border-radius: 14px; color: var(--brown);
      font-size: 16px; font-family: 'ZCOOL KuaiLe', cursive;
      letter-spacing: 0.14em; cursor: pointer;
      box-shadow: 0 2px 6px var(--shadow);
    }

    /* ═══════════════════════════════
       PAGE: IDENTITY
    ═══════════════════════════════ */
    #page-identity {
      background: var(--mochi);
      padding: 72px 28px 48px;
      overflow: hidden;
    }
    #page-identity::before {
      content: ''; position: absolute; inset: 0;
      background: radial-gradient(ellipse 55% 32% at 50% 8%, rgba(184,212,192,0.45) 0%, transparent 100%);
      pointer-events: none;
    }
    .id-back { font-size: 14px; color: var(--text-dim); margin-bottom: 24px; position: relative; cursor: pointer; }
    .id-header { margin-bottom: 40px; position: relative; }
    .id-header h2 { font-size: 28px; color: var(--brown); letter-spacing: 0.1em; margin-bottom: 6px; }
    .id-header p { font-size: 13px; color: var(--matcha); letter-spacing: 0.12em; }

    .avatar-area { display: flex; flex-direction: column; align-items: center; gap: 12px; margin-bottom: 36px; position: relative; }
    .avatar-ring {
      width: 96px; height: 96px; border-radius: 50%;
      background: var(--matcha-l);
      border: 2px solid var(--brown);
      display: flex; align-items: center; justify-content: center;
      position: relative;
      box-shadow: 0 4px 12px var(--shadow);
      cursor: pointer;
      font-size: 46px;
    }
    .avatar-cam {
      position: absolute; bottom: 0; right: 0;
      width: 28px; height: 28px; background: var(--gold);
      border: 1.5px solid var(--brown);
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 13px; pointer-events: none;
    }
    .avatar-hint { font-size: 12px; color: var(--text-dim); }

    /* emoji picker grid */
    .emoji-grid {
      display: grid; grid-template-columns: repeat(5, 1fr); gap: 8px;
      background: #FFFFFF; border: 1.5px solid var(--brown);
      border-radius: 16px; padding: 12px; margin-bottom: 16px;
      box-shadow: 0 4px 12px var(--shadow);
    }
    .emoji-opt {
      width: 46px; height: 46px; border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 24px; cursor: pointer; border: 2px solid transparent;
      transition: border-color 0.15s, background 0.15s;
    }
    .emoji-opt:hover { background: var(--matcha-l); }
    .emoji-opt.selected { border-color: var(--matcha-d); background: rgba(122,171,138,0.2); }

    .field-label { font-size: 12px; color: var(--text-dim); letter-spacing: 0.14em; display: block; margin-bottom: 10px; position: relative; }
    .text-input {
      width: 100%; background: #FFFFFF;
      border: 1.5px solid var(--brown); border-radius: 14px;
      padding: 16px 20px; font-size: 16px; color: var(--text);
      font-family: 'ZCOOL KuaiLe', cursive;
      margin-bottom: 32px;
      box-shadow: 0 2px 8px var(--shadow);
      outline: none;
      position: relative;
    }
    .text-input:focus { border-color: var(--matcha); }
    .text-input::placeholder { color: var(--text-light); }

    .green-btn {
      width: 100%; padding: 18px;
      background: linear-gradient(160deg, var(--matcha) 0%, var(--matcha-d) 100%);
      border: 2px solid var(--brown); border-radius: 16px;
      color: #FFFFFF; font-size: 18px; font-family: 'ZCOOL KuaiLe', cursive;
      letter-spacing: 0.18em;
      box-shadow: 0 4px 12px var(--shadow), 0 2px 0 var(--brown);
      cursor: pointer;
    }
    .green-btn:active { transform: translateY(1px); }
    .green-btn:disabled { background: var(--gray-dis); border-color: var(--gray-dis); box-shadow: none; cursor: default; }

    /* ═══════════════════════════════
       PAGE: MAIN TABLE
    ═══════════════════════════════ */
    #page-main {
      background: #E8F0EB;
      overflow: hidden;
    }
    .tbl-header {
      height: 56px; flex-shrink: 0;
      display: flex; align-items: center; justify-content: space-between;
      padding: 6px 20px 0;
      background: rgba(245,240,232,0.95);
      border-bottom: 1.5px solid rgba(74,55,40,0.1);
      backdrop-filter: blur(6px);
      position: relative; z-index: 10;
    }
    .room-info { display: flex; align-items: baseline; gap: 6px; }
    .room-word { font-size: 12px; color: var(--text-dim); letter-spacing: 0.1em; }
    .room-num { font-size: 22px; font-weight: 700; color: var(--matcha-d); font-family: 'Fredoka', sans-serif; letter-spacing: 0.18em; }

    .tbl-area {
      flex: 1; position: relative;
      display: flex; align-items: center; justify-content: center;
    }
    .tbl-area::before {
      content: ''; position: absolute; inset: 0;
      background: radial-gradient(ellipse 80% 75% at 50% 50%, rgba(122,171,138,0.35) 0%, #D8EAD8 100%);
      pointer-events: none;
    }

    .felt-oval {
      position: absolute;
      width: 292px; height: 452px;
      top: 50%; left: 50%; transform: translate(-50%, -50%);
      border-radius: 50%;
      background: radial-gradient(ellipse 80% 70% at 38% 35%, #8ABE96 0%, #6EA07A 55%, #5A8A6A 100%);
      border: 2.5px solid var(--brown);
      box-shadow: 0 0 0 4px rgba(122,171,138,0.25), 0 16px 48px rgba(74,55,40,0.2), inset 0 0 60px rgba(74,55,40,0.1);
    }
    .felt-oval::after {
      content: ''; position: absolute; inset: 14px;
      border-radius: 50%; border: 1px solid rgba(255,255,255,0.2);
    }

    .pp { position: absolute; display: flex; flex-direction: column; align-items: center; gap: 5px; z-index: 5; }
    .pp-top    { top: 14px;   left: 50%; transform: translateX(-50%); }
    .pp-left   { left: 8px;   top: 50%;  transform: translateY(-50%); }
    .pp-right  { right: 8px;  top: 50%;  transform: translateY(-50%); }
    .pp-bottom { bottom: 2px; left: 50%; transform: translateX(-50%); }

    .av {
      width: 62px; height: 62px; border-radius: 50%;
      border: 2px solid var(--brown);
      background: var(--mochi);
      display: flex; align-items: center; justify-content: center;
      font-size: 26px;
      box-shadow: 0 4px 10px rgba(74,55,40,0.2);
      position: relative;
      cursor: pointer;
      user-select: none;
      transition: transform 0.15s;
    }
    .av:active { transform: scale(0.93); }
    .av-self {
      width: 64px; height: 64px; font-size: 28px;
      border: 2.5px solid var(--gold);
      box-shadow: 0 0 0 3px rgba(240,200,74,0.3), 0 4px 12px rgba(74,55,40,0.2);
      cursor: default;
    }
    .av-self:active { transform: none; }
    .crown { position: absolute; top: -18px; left: 50%; transform: translateX(-50%); font-size: 16px; }
    .name-tag {
      background: #FFFFFF; border: 1.5px solid var(--brown);
      border-radius: 20px; padding: 3px 10px;
      font-size: 11px; color: var(--brown);
      white-space: nowrap;
      box-shadow: 0 2px 6px var(--shadow);
    }
    .score-self {
      font-size: 24px; font-weight: 700;
      color: var(--brown);
      font-family: 'Fredoka', sans-serif;
    }

    /* pool */
    .pool-center {
      position: absolute;
      top: 50%; left: 50%;
      transform: translate(-50%, -52%);
      z-index: 6;
      display: flex; flex-direction: column; align-items: center;
      cursor: pointer;
    }
    .pool-ip-img {
      width: 128px; height: 76px;
      object-fit: contain; object-position: bottom center;
      display: block; position: relative; z-index: 2;
      margin-bottom: -12px;
      filter: drop-shadow(0 4px 6px rgba(74,55,40,0.2));
    }
    .pool-score-box {
      background: linear-gradient(160deg, var(--gold) 0%, var(--gold-d) 100%);
      border: 2px solid var(--brown); border-radius: 20px;
      padding: 7px 20px;
      display: flex; align-items: baseline; gap: 4px;
      box-shadow: 0 4px 12px rgba(74,55,40,0.2), 0 2px 0 rgba(74,55,40,0.3);
      position: relative; z-index: 1;
    }
    .pool-lbl { font-size: 13px; color: var(--brown); letter-spacing: 0.06em; }
    .pool-num { font-size: 24px; font-weight: 700; color: var(--brown); font-family: 'Fredoka', sans-serif; }
    .pool-unit { font-size: 13px; color: var(--brown); }

    /* bottom nav */
    .btm-nav {
      height: 68px; flex-shrink: 0;
      background: rgba(245,240,232,0.95);
      border-top: 1.5px solid rgba(74,55,40,0.1);
      display: flex; align-items: center; justify-content: space-around;
      padding: 0 60px 10px;
    }
    .nav-item { display: flex; flex-direction: column; align-items: center; gap: 3px; cursor: pointer; }
    .nav-ico { font-size: 22px; }
    .nav-txt { font-size: 12px; color: var(--text-dim); }

    /* drag ghost */
    .drag-ghost {
      position: fixed;
      width: 56px; height: 56px; border-radius: 50%;
      background: var(--matcha-l);
      border: 2px solid var(--matcha-d);
      display: flex; align-items: center; justify-content: center;
      font-size: 26px;
      box-shadow: 0 8px 24px rgba(74,55,40,0.3);
      pointer-events: none;
      z-index: 9998;
      opacity: 0.85;
      transform: translate(-50%, -50%) scale(1.1);
      transition: opacity 0.1s;
    }
    .pp.drag-over .av { border-color: var(--gold); box-shadow: 0 0 0 3px rgba(240,200,74,0.4); }

    /* ── Bench seat positions ── */
    .pp-bench-L { top: 10px; left: 10px; z-index: 5; }
    .pp-bench-R { top: 10px; right: 10px; z-index: 5; }
    .bench-badge {
      font-size: 9px; color: rgba(255,255,255,0.85);
      background: rgba(74,55,40,0.52); border-radius: 5px;
      padding: 2px 6px; letter-spacing: 0.06em;
      margin-bottom: 3px; white-space: nowrap;
    }
    .av-bench {
      width: 46px; height: 46px; border-radius: 50%;
      border: 2px dashed var(--matcha-d);
      background: rgba(245,240,232,0.95);
      display: flex; align-items: center; justify-content: center;
      font-size: 22px;
      box-shadow: 0 3px 8px rgba(74,55,40,0.15);
      cursor: pointer;
      transition: transform 0.15s;
    }
    .av-bench:active { transform: scale(0.93); }
    .av-bench-self {
      border: 2.5px solid var(--gold) !important;
      box-shadow: 0 0 0 3px rgba(240,200,74,0.3), 0 3px 8px rgba(74,55,40,0.15) !important;
      cursor: default !important;
    }
    .name-bench { font-size: 10px; padding: 2px 7px; }
    .score-bench {
      font-size: 18px; font-weight: 700; color: var(--brown);
      font-family: 'Fredoka', sans-serif;
    }

    /* ── Swap mode banner ── */
    .swap-mode-banner {
      position: absolute; top: 0; left: 0; right: 0; z-index: 14;
      background: rgba(240,200,74,0.92);
      border-bottom: 2px solid var(--brown);
      padding: 8px 16px;
      display: flex; align-items: center; gap: 8px;
      font-size: 12px; color: var(--brown);
      letter-spacing: 0.06em;
    }
    .swap-banner-hint { flex: 1; }
    .swap-banner-cancel {
      background: var(--brown); color: #FFF;
      border: none; border-radius: 8px;
      padding: 4px 12px; font-size: 12px;
      font-family: 'ZCOOL KuaiLe', cursive; cursor: pointer;
    }

    /* ── Swap selectable / selected ── */
    .swap-selectable .av,
    .swap-selectable .av-self,
    .swap-selectable .av-bench {
      outline: 2px dashed rgba(240,200,74,0.8); outline-offset: 2px; cursor: pointer !important;
    }
    .swap-selected .av,
    .swap-selected .av-self,
    .swap-selected .av-bench {
      outline: 3px solid var(--gold); outline-offset: 2px;
      box-shadow: 0 0 0 5px rgba(240,200,74,0.35) !important;
    }

    /* ── Bench follow bar ── */
    .bench-follow-bar {
      position: absolute; bottom: 10px; left: 50%; transform: translateX(-50%);
      z-index: 12;
      background: rgba(74,55,40,0.78); border-radius: 16px; padding: 6px 10px;
      display: flex; align-items: center; gap: 6px;
      backdrop-filter: blur(4px);
    }
    .follow-lbl { font-size: 10px; color: rgba(255,255,255,0.75); letter-spacing: 0.04em; white-space: nowrap; }
    .follow-btn {
      width: 32px; height: 32px; border-radius: 50%;
      background: rgba(255,255,255,0.12); border: 1.5px solid rgba(255,255,255,0.25);
      font-size: 16px; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: all 0.15s;
    }
    .follow-btn.active-follow { background: var(--gold); border-color: var(--brown); box-shadow: 0 0 0 2px rgba(240,200,74,0.5); }

    /* ── Demo view switcher ── */
    .demo-player-btn {
      display: flex; align-items: center; gap: 8px;
      padding: 8px 10px; border-radius: 10px; cursor: pointer;
      transition: background 0.15s;
    }
    .demo-player-btn:hover { background: rgba(122,171,138,0.12); }
    .demo-player-btn.demo-me { background: rgba(240,200,74,0.15); }
    .demo-av-ico { font-size: 18px; }
    .demo-pname { font-size: 13px; color: var(--brown); flex: 1; }
    .demo-bench-tag { font-size: 9px; color: var(--text-dim); background: rgba(74,55,40,0.08); border-radius: 4px; padding: 1px 5px; }
    .demo-host-tag  { font-size: 9px; color: var(--gold-d);  background: rgba(240,200,74,0.15); border-radius: 4px; padding: 1px 5px; }

    /* ═══════════════════════════════
       BOTTOM SHEETS
    ═══════════════════════════════ */
    .sheet-overlay {
      position: absolute; inset: 0; z-index: 100;
      display: none;
      flex-direction: column;
      justify-content: flex-end;
    }
    .sheet-overlay.open { display: flex; }

    .sheet-dim {
      position: absolute; inset: 0;
      background: rgba(74,55,40,0.35);
      backdrop-filter: blur(3px);
    }

    .sheet-panel {
      position: relative; z-index: 1;
      background: var(--mochi);
      border-top-left-radius: 24px; border-top-right-radius: 24px;
      border-top: 2px solid var(--brown);
      padding: 0 24px 44px;
      box-shadow: 0 -8px 32px rgba(74,55,40,0.15);
      transform: translateY(100%);
      transition: transform 0.32s cubic-bezier(0.32, 0.72, 0, 1);
    }
    .sheet-overlay.open .sheet-panel { transform: translateY(0); }

    .sheet-knob { width: 36px; height: 4px; background: var(--gray-dis); border-radius: 2px; margin: 14px auto 20px; }
    .sheet-ttl { font-size: 20px; color: var(--brown); letter-spacing: 0.14em; text-align: center; margin-bottom: 22px; }

    /* Transfer */
    .recipient-row {
      display: flex; align-items: center; gap: 14px;
      background: #FFFFFF; border: 1.5px solid var(--brown);
      border-radius: 14px; padding: 14px 16px; margin-bottom: 20px;
      box-shadow: 0 2px 8px var(--shadow);
    }
    .rec-av {
      width: 46px; height: 46px; border-radius: 50%;
      background: var(--matcha-l); border: 2px solid var(--brown);
      display: flex; align-items: center; justify-content: center;
      font-size: 22px; font-family: 'ZCOOL KuaiLe', cursive;
    }
    .rec-info { flex: 1; }
    .rec-lbl { font-size: 10px; color: var(--text-dim); letter-spacing: 0.12em; margin-bottom: 3px; }
    .rec-name { font-size: 16px; color: var(--brown); }
    .lock-badge {
      font-size: 11px; color: var(--matcha-d);
      border: 1px solid var(--matcha); border-radius: 8px;
      padding: 3px 9px; background: rgba(122,171,138,0.12);
    }

    .direction-row {
      display: flex; align-items: center; gap: 8px; margin-bottom: 14px;
    }
    .dir-btn {
      flex: 1; padding: 10px 0; border-radius: 12px;
      font-size: 14px; font-family: 'ZCOOL KuaiLe', cursive;
      letter-spacing: 0.1em; cursor: pointer; border: 2px solid var(--brown);
      color: var(--brown); background: #FFFFFF;
    }
    .dir-btn.active-send { background: var(--pink); color: var(--brown); }
    .dir-btn.active-recv { background: var(--matcha-l); color: var(--brown); }

    .amt-lbl { font-size: 12px; color: var(--text-dim); letter-spacing: 0.12em; display: block; margin-bottom: 10px; }
    .amt-box {
      width: 100%; background: #FFFFFF;
      border: 2px solid var(--brown); border-radius: 14px;
      padding: 14px; font-size: 44px; color: var(--brown);
      text-align: center;
      font-family: 'Fredoka', sans-serif; font-weight: 700;
      margin-bottom: 20px;
      box-shadow: 0 2px 8px var(--shadow);
      outline: none;
    }
    .pink-btn {
      width: 100%; padding: 18px;
      background: linear-gradient(160deg, #F0B0B8 0%, var(--pink) 100%);
      border: 2px solid var(--brown); border-radius: 16px;
      color: var(--brown); font-size: 18px; font-family: 'ZCOOL KuaiLe', cursive;
      letter-spacing: 0.18em;
      box-shadow: 0 4px 12px var(--shadow), 0 2px 0 var(--brown);
      cursor: pointer;
    }

    /* Pool sheet */
    .pool-summary {
      text-align: center;
      background: linear-gradient(160deg, var(--gold) 0%, var(--gold-d) 100%);
      border: 2px solid var(--brown); border-radius: 16px;
      padding: 18px; margin-bottom: 22px;
      box-shadow: 0 4px 12px var(--shadow);
    }
    .pool-sum-lbl { font-size: 12px; color: var(--brown); opacity: 0.7; letter-spacing: 0.12em; margin-bottom: 4px; }
    .pool-sum-num { font-size: 52px; font-weight: 700; color: var(--brown); font-family: 'Fredoka', sans-serif; line-height: 1; }
    .pool-sum-unit { font-size: 14px; color: var(--brown); opacity: 0.7; margin-top: 2px; }
    .pool-btn-row { display: flex; flex-direction: column; gap: 12px; }
    .pool-btn {
      width: 100%; padding: 18px; border-radius: 16px;
      font-size: 18px; font-family: 'ZCOOL KuaiLe', cursive; letter-spacing: 0.1em;
      border: 2px solid var(--brown); cursor: pointer;
      box-shadow: 0 2px 0 var(--brown);
    }
    .pool-btn-in { background: var(--matcha-l); color: var(--brown); }
    .pool-btn-collect { background: linear-gradient(160deg, var(--gold) 0%, var(--gold-d) 100%); color: var(--brown); }
    .pool-btn-disabled { background: var(--gray-dis); color: rgba(74,55,40,0.35); border-color: var(--gray-dis); box-shadow: none; cursor: not-allowed; }

    /* History sheet */
    .hist-list { display: flex; flex-direction: column; max-height: 380px; overflow-y: auto; }
    .hist-item {
      display: flex; align-items: center;
      padding: 14px 0; border-bottom: 1px solid rgba(74,55,40,0.08); gap: 8px;
    }
    .hist-item:last-child { border-bottom: none; }
    .hist-desc { flex: 1; font-size: 14px; color: var(--brown); }
    .hist-amt { font-size: 16px; font-family: 'Fredoka', sans-serif; font-weight: 700; min-width: 38px; text-align: right; }
    .ha-neg  { color: var(--red-minus); }
    .ha-pos  { color: var(--green-plus); }
    .ha-pool { color: #C8940A; }
    .ha-gray { color: var(--gray-dis); }
    .revoke-btn {
      background: #FFFFFF; border: 1.5px solid rgba(74,55,40,0.2);
      border-radius: 8px; padding: 4px 10px;
      color: rgba(74,55,40,0.45); font-size: 12px;
      font-family: 'ZCOOL KuaiLe', cursive;
      cursor: pointer; white-space: nowrap; margin-left: 8px;
    }
    .hist-empty { text-align: center; color: var(--text-light); font-size: 14px; padding: 40px 0; }

    /* Settings sheet */
    .setting-lbl { font-size: 12px; color: var(--text-dim); letter-spacing: 0.12em; display: block; margin-bottom: 10px; }
    .setting-input {
      width: 100%; background: #FFFFFF;
      border: 2px solid var(--brown); border-radius: 14px;
      padding: 14px 20px; font-size: 24px; color: var(--brown);
      font-family: 'Fredoka', sans-serif; font-weight: 700;
      margin-bottom: 6px; box-shadow: 0 2px 8px var(--shadow);
      outline: none;
      text-align: center;
    }
    .setting-hint { font-size: 11px; color: var(--text-dim); margin-bottom: 22px; }
    .divider { height: 1px; background: rgba(74,55,40,0.08); margin: 20px 0; }
    .danger-btn {
      width: 100%; padding: 18px;
      background: rgba(232,112,112,0.1);
      border: 2px solid var(--red-minus); border-radius: 16px;
      color: var(--red-minus); font-size: 17px;
      font-family: 'ZCOOL KuaiLe', cursive; letter-spacing: 0.1em;
      cursor: pointer;
    }
    .danger-btn:active { background: rgba(232,112,112,0.2); }

    /* ── Settings: player list for kick ── */
    .kick-list { display: flex; flex-direction: column; gap: 10px; margin-bottom: 6px; }
    .kick-item {
      display: flex; align-items: center; gap: 12px;
      background: #FFFFFF; border: 1.5px solid var(--brown);
      border-radius: 12px; padding: 10px 14px;
      box-shadow: 0 2px 6px var(--shadow);
    }
    .kick-av { width: 36px; height: 36px; border-radius: 50%; background: var(--matcha-l); border: 1.5px solid var(--brown); display: flex; align-items: center; justify-content: center; font-size: 18px; }
    .kick-name { flex: 1; font-size: 15px; color: var(--brown); }
    .kick-btn {
      padding: 6px 14px; border-radius: 10px; font-size: 12px;
      font-family: 'ZCOOL KuaiLe', cursive; cursor: pointer;
      border: 1.5px solid var(--red-minus); color: var(--red-minus);
      background: rgba(232,112,112,0.08);
    }
    .kick-btn:active { background: rgba(232,112,112,0.2); }

    /* ── Swap confirm overlay ── */
    #swap-confirm {
      position: absolute; inset: 0; z-index: 200;
      background: rgba(74,55,40,0.4);
      backdrop-filter: blur(4px);
      display: none;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }
    #swap-confirm.open { display: flex; }
    .swap-card {
      background: var(--mochi);
      border: 2px solid var(--brown);
      border-radius: 24px;
      padding: 28px 24px;
      width: 100%;
      box-shadow: 0 16px 48px rgba(74,55,40,0.25);
      text-align: center;
    }
    .swap-card h3 { font-size: 20px; color: var(--brown); margin-bottom: 10px; letter-spacing: 0.1em; }
    .swap-card p { font-size: 14px; color: var(--text-dim); margin-bottom: 24px; letter-spacing: 0.06em; }
    .swap-avatars { display: flex; align-items: center; justify-content: center; gap: 14px; margin-bottom: 24px; }
    .swap-av { width: 56px; height: 56px; border-radius: 50%; background: var(--matcha-l); border: 2px solid var(--brown); display: flex; align-items: center; justify-content: center; font-size: 26px; }
    .swap-arrow { font-size: 20px; color: var(--text-dim); }
    .swap-btns { display: flex; gap: 12px; }
    .swap-cancel { flex: 1; padding: 14px; background: #FFFFFF; border: 1.5px solid var(--brown); border-radius: 14px; font-size: 16px; font-family: 'ZCOOL KuaiLe', cursive; color: var(--text-dim); cursor: pointer; }
    .swap-ok { flex: 1; padding: 14px; background: linear-gradient(160deg, var(--matcha) 0%, var(--matcha-d) 100%); border: 2px solid var(--brown); border-radius: 14px; font-size: 16px; font-family: 'ZCOOL KuaiLe', cursive; color: #FFFFFF; cursor: pointer; }

    /* ── Generic confirm dialog ── */
    #confirm-dialog {
      position: absolute; inset: 0; z-index: 300;
      background: rgba(74,55,40,0.4);
      backdrop-filter: blur(4px);
      display: none;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }
    #confirm-dialog.open { display: flex; }
    .confirm-card {
      background: var(--mochi);
      border: 2px solid var(--brown);
      border-radius: 24px;
      padding: 28px 24px;
      width: 100%;
      box-shadow: 0 16px 48px rgba(74,55,40,0.25);
      text-align: center;
    }
    .confirm-card h3 { font-size: 18px; color: var(--brown); margin-bottom: 10px; }
    .confirm-card p { font-size: 13px; color: var(--text-dim); margin-bottom: 24px; line-height: 1.6; }
    .confirm-btns { display: flex; gap: 12px; }
    .confirm-cancel { flex: 1; padding: 14px; background: #FFFFFF; border: 1.5px solid var(--brown); border-radius: 14px; font-size: 15px; font-family: 'ZCOOL KuaiLe', cursive; color: var(--text-dim); cursor: pointer; }
    .confirm-ok { flex: 1; padding: 14px; background: rgba(232,112,112,0.15); border: 2px solid var(--red-minus); border-radius: 14px; font-size: 15px; font-family: 'ZCOOL KuaiLe', cursive; color: var(--red-minus); cursor: pointer; }

    /* ── Input error ── */
    .input-error { font-size: 11px; color: var(--red-minus); margin-top: -26px; margin-bottom: 18px; letter-spacing: 0.06em; display: none; }
    .input-error.show { display: block; }
    .text-input.error { border-color: var(--red-minus); }

    /* ── Toast ── */
    #toast {
      position: absolute; bottom: 90px; left: 50%; transform: translateX(-50%) translateY(20px);
      background: rgba(74,55,40,0.85);
      color: #FFFFFF; font-size: 13px; letter-spacing: 0.1em;
      padding: 10px 20px; border-radius: 20px;
      opacity: 0; transition: opacity 0.25s, transform 0.25s;
      pointer-events: none; z-index: 9999;
      white-space: nowrap;
    }
    #toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
  </style>
</head>
<body>
<div id="app">

  <!-- ① ENTRY PAGE -->
  <div id="page-entry" class="page active">
    <div class="deco d1"></div>
    <div class="deco d2"></div>
    <div style="position:relative;text-align:center;">
      <div class="ip-logo"><img src="./ip-standing.jpg" alt="麻薯"></div>
      <div class="brand-name">麻薯计分</div>
    </div>
    <!-- 初始状态：两个按钮 -->
    <div id="entry-btns" style="width:100%;margin-top:24px;display:flex;flex-direction:column;gap:14px;">
      <button class="entry-btn" onclick="selectMode('create')">创 建 房 间</button>
      <button class="entry-btn entry-btn-secondary" onclick="selectMode('join')">加 入 房 间</button>
    </div>
    <!-- 输入状态：选择模式后展示 -->
    <div id="entry-input" style="width:100%;margin-top:24px;display:none;">
      <div class="room-label-txt" id="entry-mode-label">输 入 新 房 间 号</div>
      <input id="room-code-input" class="room-input-box" type="text" inputmode="numeric" maxlength="4" placeholder="8888" pattern="\d{4}">
      <div class="entry-error" id="entry-error"></div>
      <button class="entry-btn" id="entry-confirm-btn" onclick="confirmRoom()">确 认</button>
      <div class="entry-back" onclick="resetEntry()">返 回</div>
    </div>
  </div>

  <!-- ② IDENTITY PAGE -->
  <div id="page-identity" class="page">
    <div style="position:relative;">
      <div class="id-back" onclick="goBack()">‹ 返回</div>
      <div class="id-header">
        <h2>设 置 身 份</h2>
        <p id="id-room-label">房间 8888</p>
      </div>
      <div class="avatar-area">
        <div class="avatar-ring" id="avatar-display">
          <span id="avatar-emoji">🍡</span>
        </div>
        <div class="avatar-hint">选 择 你 的 头 像</div>
      </div>
      <div id="emoji-picker" class="emoji-grid"></div>
      <span class="field-label">你 的 名 字</span>
      <input class="text-input" id="name-input" type="text" placeholder="请输入姓名（最多6字）" maxlength="6" oninput="checkNameInput()">
      <div class="input-error" id="name-error">仅支持汉字、字母、数字，不能含特殊字符</div>
      <button class="green-btn" id="identity-btn" onclick="enterIdentity()" disabled>进 入 房 间</button>
    </div>
  </div>

  <!-- ③ MAIN TABLE PAGE -->
  <div id="page-main" class="page">
    <div class="tbl-header">
      <div class="room-info">
        <span class="room-word">房间</span>
        <span class="room-num" id="main-room-num">8888</span>
      </div>
      <div style="display:flex;align-items:center;gap:6px;">
        <div style="font-size:12px;color:var(--text-dim);letter-spacing:0.08em;" id="online-count">6人在线</div>
        <button id="swap-mode-btn" onclick="toggleSwapMode()" style="display:none;background:var(--gold);border:2px solid var(--brown);border-radius:10px;padding:3px 12px;font-size:12px;font-family:'ZCOOL KuaiLe',cursive;color:var(--brown);cursor:pointer;letter-spacing:0.06em;white-space:nowrap;">换 座</button>
        <button onclick="toggleViewSwitcher()" style="background:rgba(122,171,138,0.18);border:1px solid var(--matcha);border-radius:8px;padding:3px 8px;font-size:11px;color:var(--matcha-d);cursor:pointer;font-family:'ZCOOL KuaiLe',cursive;letter-spacing:0.04em;white-space:nowrap;">👁 视角</button>
      </div>
    </div>
    <div class="tbl-area" id="tbl-area">
      <div class="felt-oval"></div>

      <!-- Swap mode banner -->
      <div class="swap-mode-banner" id="swap-mode-banner" style="display:none;">
        <span class="swap-banner-hint" id="swap-banner-hint">点击任意玩家选择换座</span>
        <button class="swap-banner-cancel" onclick="toggleSwapMode()">取消</button>
      </div>

      <!-- Bench left (5th player) -->
      <div class="pp pp-bench-L" id="pp-bench-L" style="display:none;">
        <div class="bench-badge" id="bench-badge-L">备战席</div>
        <div class="av-bench" id="av-bench-L" onclick="handlePlayerTap('bench-left')"></div>
        <div class="name-tag name-bench" id="name-bench-L"></div>
        <div class="score-bench" id="score-bench-L" style="display:none;"></div>
      </div>

      <!-- Bench right (6th player) -->
      <div class="pp pp-bench-R" id="pp-bench-R" style="display:none;">
        <div class="bench-badge" id="bench-badge-R">备战席</div>
        <div class="av-bench" id="av-bench-R" onclick="handlePlayerTap('bench-right')"></div>
        <div class="name-tag name-bench" id="name-bench-R"></div>
        <div class="score-bench" id="score-bench-R" style="display:none;"></div>
      </div>

      <!-- Top player -->
      <div class="pp pp-top" id="pp-top">
        <div class="av" id="av-top" onclick="handlePlayerTap('top')">
          <div class="crown" id="crown-top" style="display:none;">👑</div>
        </div>
        <div class="name-tag" id="name-top"></div>
      </div>

      <!-- Left player -->
      <div class="pp pp-left" id="pp-left">
        <div class="av" id="av-left" onclick="handlePlayerTap('left')">
          <div class="crown" id="crown-left" style="display:none;">👑</div>
        </div>
        <div class="name-tag" id="name-left"></div>
      </div>

      <!-- Right player -->
      <div class="pp pp-right" id="pp-right">
        <div class="av" id="av-right" onclick="handlePlayerTap('right')">
          <div class="crown" id="crown-right" style="display:none;">👑</div>
        </div>
        <div class="name-tag" id="name-right"></div>
      </div>

      <!-- Pool -->
      <div class="pool-center" id="pool-center" onclick="openSheet('pool')">
        <img class="pool-ip-img" src="./ip-reclining.jpg" alt="公池">
        <div class="pool-score-box">
          <span class="pool-lbl">公池</span>
          <span class="pool-num" id="pool-num">0</span>
          <span class="pool-unit">分</span>
        </div>
      </div>

      <!-- Self (bottom) — onclick handles swap-mode tap and bench-viewer transfers -->
      <div class="pp pp-bottom" id="pp-bottom" onclick="handlePlayerTap('bottom')">
        <div class="av av-self" id="av-self">
          <div class="crown" id="crown-self" style="display:none;">👑</div>
          <span id="av-self-emoji"></span>
        </div>
        <div class="name-tag" id="name-self"></div>
        <div class="score-self" id="score-self">0</div>
      </div>

      <!-- Bench follow bar (visible only when viewer is on bench) -->
      <div class="bench-follow-bar" id="bench-follow-bar" style="display:none;">
        <span class="follow-lbl">观看：</span>
        <div class="follow-btn" data-followseat="bottom" onclick="setBenchFollow('bottom')">·</div>
        <div class="follow-btn" data-followseat="top"    onclick="setBenchFollow('top')">·</div>
        <div class="follow-btn" data-followseat="left"   onclick="setBenchFollow('left')">·</div>
        <div class="follow-btn" data-followseat="right"  onclick="setBenchFollow('right')">·</div>
      </div>
    </div>
    <div class="btm-nav">
      <div class="nav-item" onclick="openSheet('history')">
        <div class="nav-ico">📋</div><div class="nav-txt">记录</div>
      </div>
      <div class="nav-item" id="nav-settings" onclick="openSettingsSheet()">
        <div class="nav-ico">⚙️</div><div class="nav-txt">设置</div>
      </div>
    </div>

    <!-- Demo view switcher dropdown (prototype only) -->
    <div id="view-switcher" style="display:none;position:absolute;top:56px;right:8px;z-index:500;background:var(--mochi);border:2px solid var(--brown);border-radius:16px;padding:14px 12px;box-shadow:0 8px 24px rgba(74,55,40,0.25);min-width:188px;">
      <div style="font-size:10px;color:var(--text-dim);letter-spacing:0.1em;margin-bottom:10px;text-align:center;">— 演 示 视 角 切 换 —</div>
      <div id="demo-player-list" style="display:flex;flex-direction:column;gap:4px;"></div>
    </div>
  </div>

  <!-- ── SHEET: TRANSFER ── -->
  <div id="sheet-transfer" class="sheet-overlay">
    <div class="sheet-dim" onclick="closeSheet('transfer')"></div>
    <div class="sheet-panel">
      <div class="sheet-knob"></div>
      <div class="sheet-ttl">转 账</div>
      <div class="recipient-row">
        <div class="rec-av" id="transfer-rec-av"></div>
        <div class="rec-info">
          <div class="rec-lbl">付给对方</div>
          <div class="rec-name" id="transfer-rec-name"></div>
        </div>
      </div>
      <span class="amt-lbl" id="transfer-dir-hint">你将付出多少分？</span>
      <input class="amt-box" id="transfer-amount" type="number" inputmode="numeric" placeholder="0" min="1" oninput="updateTransferHint()">
      <button class="pink-btn" onclick="confirmTransfer()">确 认 转 账</button>
    </div>
  </div>

  <!-- ── SHEET: POOL ── -->
  <div id="sheet-pool" class="sheet-overlay">
    <div class="sheet-dim" onclick="closeSheet('pool')"></div>
    <div class="sheet-panel">
      <div class="sheet-knob"></div>
      <div class="sheet-ttl">公 池</div>
      <div class="pool-summary">
        <div class="pool-sum-lbl">当前公池</div>
        <div class="pool-sum-num" id="pool-sheet-num">0</div>
        <div class="pool-sum-unit">分</div>
      </div>
      <div class="pool-btn-row">
        <button class="pool-btn pool-btn-in" onclick="poolAction('pay')">交公池（-1分）</button>
        <button class="pool-btn pool-btn-collect" id="pool-collect-btn" onclick="poolAction('collect')">收公池（+<span id="pool-collect-amt">0</span>分）</button>
      </div>
    </div>
  </div>

  <!-- ── SHEET: HISTORY ── -->
  <div id="sheet-history" class="sheet-overlay">
    <div class="sheet-dim" onclick="closeSheet('history')"></div>
    <div class="sheet-panel">
      <div class="sheet-knob"></div>
      <div class="sheet-ttl">交易记录</div>
      <div class="hist-list" id="hist-list"></div>
    </div>
  </div>

  <!-- ── SHEET: SETTINGS ── -->
  <div id="sheet-settings" class="sheet-overlay">
    <div class="sheet-dim" onclick="closeSheet('settings')"></div>
    <div class="sheet-panel" style="max-height:80vh;overflow-y:auto;">
      <div class="sheet-knob"></div>
      <div class="sheet-ttl">房间设置</div>
      <!-- 房主专属 -->
      <div id="host-settings">
        <span class="setting-lbl">初 始 分 数</span>
        <input class="setting-input" id="setting-init-score" type="number" inputmode="numeric" value="200" onchange="updateInitScore()">
        <div class="setting-hint">仅影响重置后的分数</div>
        <div class="divider"></div>
        <span class="setting-lbl">踢 出 玩 家</span>
        <div class="kick-list" id="kick-list"></div>
        <div class="divider"></div>
        <button class="danger-btn" onclick="confirmReset()" style="margin-bottom:10px;">重 置 分 数</button>
        <button class="danger-btn" onclick="confirmDissolve()" style="margin-bottom:16px;">解 散 房 间</button>
        <div class="divider" style="margin-bottom:16px;"></div>
      </div>
      <!-- 所有人可见 -->
      <button class="exit-room-btn" onclick="confirmLeave()">退 出 房 间</button>
    </div>
  </div>

  <!-- ── SWAP CONFIRM ── -->
  <div id="swap-confirm">
    <div class="swap-card">
      <h3>换 座 确 认</h3>
      <p id="swap-desc">确认与对方交换座位吗？</p>
      <div class="swap-avatars">
        <div class="swap-av" id="swap-av-self"></div>
        <div class="swap-arrow">⇄</div>
        <div class="swap-av" id="swap-av-other"></div>
      </div>
      <div class="swap-btns">
        <button class="swap-cancel" onclick="cancelSwap()">取消</button>
        <button class="swap-ok" onclick="confirmSwap()">确认换座</button>
      </div>
    </div>
  </div>

  <!-- ── GENERIC CONFIRM ── -->
  <div id="confirm-dialog">
    <div class="confirm-card">
      <h3 id="confirm-title">确认操作</h3>
      <p id="confirm-msg">确定要执行这个操作吗？</p>
      <div class="confirm-btns">
        <button class="confirm-cancel" onclick="closeConfirm()">取消</button>
        <button class="confirm-ok" id="confirm-ok-btn" onclick="executeConfirm()">确认</button>
      </div>
    </div>
  </div>

  <!-- ── TOAST ── -->
  <div id="toast"></div>

</div>

<script>
// ═══════════════════════════════════════════════
// CONSTANTS
// ═══════════════════════════════════════════════
const EMOJIS = ['🍡', '🐼', '🐨', '🦊', '🐸', '🐯', '🐻', '🐙', '🦄', '🐝', '🦋', '🍀', '🌸', '⭐', '🎃'];
// Clockwise order of table DB seats (used for view-rotation math)
const TABLE_CW = ['bottom', 'right', 'top', 'left'];
const BENCH_SEATS = ['bench-left', 'bench-right'];

// ═══════════════════════════════════════════════
// STATE — player-centric model with absolute DB seats
// ═══════════════════════════════════════════════

const state = {
  roomCode: '',
  initScore: 200,
  gameStarted: false,
  pool: 0,
  // All 6 players with absolute DB seats: [{name,emoji,score,dbSeat,isMe,isHost}]
  players: [],
  myDbSeat: 'bottom',
  benchFollowDbSeat: 'bottom', // which table DB seat bench viewer follows
  swapMode: false,
  swapFirstDbSeat: null,
  self: { name: '', emoji: '🍡' }, // temp holder for identity page
  history: [],
  transferTarget: null, // dbSeat of transfer target
  pendingConfirm: null,
  pendingSwap: null,
};

// ═══════════════════════════════════════════════
// HELPERS
// ═══════════════════════════════════════════════
function getMe()         { return state.players.find(p => p.isMe); }
function getHostPlayer() { return state.players.find(p => p.isHost); }
function isBenchViewer() { return BENCH_SEATS.includes(state.myDbSeat); }
function isTableSeat(s)  { return TABLE_CW.includes(s); }
function getViewerDbSeat() { return isBenchViewer() ? state.benchFollowDbSeat : state.myDbSeat; }

// DB seat → view seat relative to a viewer's DB seat
function getViewSeat(dbSeat, viewerDbSeat) {
  const pi = TABLE_CW.indexOf(dbSeat);
  const vi = TABLE_CW.indexOf(viewerDbSeat);
  if (pi < 0 || vi < 0) return null;
  return TABLE_CW[(pi - vi + 4) % 4];
}
// View seat → DB seat
function viewSeatToDbSeat(vs) {
  if (BENCH_SEATS.includes(vs)) return vs;
  const vds = getViewerDbSeat();
  const vi = TABLE_CW.indexOf(vds);
  const pi = TABLE_CW.indexOf(vs);
  if (vi < 0 || pi < 0) return null;
  return TABLE_CW[(pi + vi) % 4];
}
function getPlayerAtViewSeat(vs) {
  const vds = getViewerDbSeat();
  return state.players.find(p => getViewSeat(p.dbSeat, vds) === vs);
}

// ═══════════════════════════════════════════════
// NAVIGATION
// ═══════════════════════════════════════════════
function showPage(id) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

let entryMode = null; // 'create' | 'join'
const demoRooms = new Set(['8888']); // 演示用：8888 是已存在的房间

function selectMode(mode) {
  entryMode = mode;
  document.getElementById('entry-btns').style.display = 'none';
  document.getElementById('entry-input').style.display = 'block';
  document.getElementById('entry-mode-label').textContent =
    mode === 'create' ? '输 入 新 房 间 号' : '输 入 房 间 号';
  document.getElementById('entry-confirm-btn').textContent =
    mode === 'create' ? '创 建' : '加 入';
  document.getElementById('entry-error').textContent = '';
  document.getElementById('room-code-input').value = '';
  document.getElementById('room-code-input').focus();
}

function resetEntry() {
  entryMode = null;
  document.getElementById('entry-btns').style.display = 'flex';
  document.getElementById('entry-input').style.display = 'none';
  document.getElementById('entry-error').textContent = '';
  document.getElementById('room-code-input').value = '';
}

function confirmRoom() {
  const input = document.getElementById('room-code-input');
  const errorEl = document.getElementById('entry-error');
  const code = input.value.replace(/\D/g, '').slice(0, 4);
  if (code.length !== 4) { showToast('请输入4位数字房间号'); input.focus(); return; }

  if (entryMode === 'create') {
    if (demoRooms.has(code)) {
      errorEl.textContent = '该房间号已存在，请加入或换一个号码';
      return;
    }
    demoRooms.add(code);
  } else {
    if (!demoRooms.has(code)) {
      errorEl.textContent = '该房间号不存在，请检查号码或创建新房间';
      return;
    }
  }

  errorEl.textContent = '';
  state.roomCode = code;

  document.getElementById('id-room-label').textContent = '房间 ' + code;
  buildEmojiPicker();
  showPage('page-identity');
}

function enterRoom() { confirmRoom(); } // 向后兼容

function goBack() {
  showPage('page-entry');
}

function enterIdentity() {
  const name = document.getElementById('name-input').value.trim();
  if (!name) return;
  const isHost = (entryMode === 'create');
  state.players = [
    { name, emoji: state.self.emoji, score: state.initScore, dbSeat: 'bottom',       isMe: true,  isHost },
    { name: '阿福', emoji: '🐼', score: state.initScore, dbSeat: 'top',         isMe: false, isHost: false },
    { name: '老虎', emoji: '🐯', score: state.initScore, dbSeat: 'left',        isMe: false, isHost: false },
    { name: '小熊', emoji: '🐻', score: state.initScore, dbSeat: 'right',       isMe: false, isHost: false },
    { name: '花花', emoji: '🌸', score: state.initScore, dbSeat: 'bench-left',  isMe: false, isHost: false },
    { name: '星星', emoji: '⭐', score: state.initScore, dbSeat: 'bench-right', isMe: false, isHost: false },
  ];
  state.myDbSeat = 'bottom';
  state.benchFollowDbSeat = 'bottom';
  setupMainPage();
  showPage('page-main');
}

// ═══════════════════════════════════════════════
// IDENTITY PAGE HELPERS
// ═══════════════════════════════════════════════
function buildEmojiPicker() {
  const picker = document.getElementById('emoji-picker');
  picker.innerHTML = '';
  EMOJIS.forEach(e => {
    const el = document.createElement('div');
    el.className = 'emoji-opt' + (e === state.self.emoji ? ' selected' : '');
    el.textContent = e;
    el.onclick = () => selectEmoji(e);
    picker.appendChild(el);
  });
}

function selectEmoji(e) {
  state.self.emoji = e;
  document.getElementById('avatar-emoji').textContent = e;
  document.querySelectorAll('.emoji-opt').forEach(el => {
    el.classList.toggle('selected', el.textContent === e);
  });
}

const NAME_RE = /^[\u4e00-\u9fa5a-zA-Z0-9]+$/;

function checkNameInput() {
  const raw = document.getElementById('name-input').value;
  const val = raw.trim();
  const errEl = document.getElementById('name-error');
  const inputEl = document.getElementById('name-input');
  const btn = document.getElementById('identity-btn');

  if (!val) {
    errEl.classList.remove('show');
    inputEl.classList.remove('error');
    btn.disabled = true;
    return;
  }
  if (!NAME_RE.test(val)) {
    errEl.classList.add('show');
    inputEl.classList.add('error');
    btn.disabled = true;
  } else {
    errEl.classList.remove('show');
    inputEl.classList.remove('error');
    btn.disabled = false;
  }
}

// ═══════════════════════════════════════════════
// MAIN PAGE SETUP & RENDER
// ═══════════════════════════════════════════════
function setupMainPage() {
  document.getElementById('main-room-num').textContent = state.roomCode;
  renderMain();
}

function renderMain() {
  const me = getMe();
  if (!me) return;
  const bench = isBenchViewer();

  // ── Bottom position ──
  const bottomP = bench ? getPlayerAtViewSeat('bottom') : me;
  document.getElementById('crown-self').style.display = bottomP?.isHost ? 'block' : 'none';
  document.getElementById('av-self-emoji').textContent = bottomP?.emoji ?? '';

  if (bench) {
    document.getElementById('name-self').textContent = bottomP?.name ?? '';
    document.getElementById('score-self').textContent = '';
    document.getElementById('av-self').style.border = '2px solid var(--brown)';
    document.getElementById('av-self').style.cursor = 'pointer';
  } else {
    document.getElementById('name-self').textContent = me.name + '（我）';
    document.getElementById('score-self').textContent = me.score;
    document.getElementById('av-self').style.border = '2.5px solid var(--gold)';
    document.getElementById('av-self').style.cursor = 'default';
  }
  document.getElementById('pp-bottom').dataset.dbseat = bench ? (bottomP?.dbSeat ?? '') : me.dbSeat;
  document.getElementById('pp-bottom').style.bottom = bench ? '66px' : '2px';

  // ── Table view positions ──
  ['top', 'left', 'right'].forEach(vs => {
    const p      = getPlayerAtViewSeat(vs);
    const pp     = document.getElementById('pp-' + vs);
    const av     = document.getElementById('av-' + vs);
    const nm     = document.getElementById('name-' + vs);
    const crown  = document.getElementById('crown-' + vs);
    if (p) {
      av.childNodes.forEach(n => { if (n.nodeType === 3) n.remove(); });
      av.insertAdjacentText('beforeend', p.emoji);
      nm.textContent = p.name;
      if (crown) crown.style.display = p.isHost ? 'block' : 'none';
      av.style.opacity = ''; nm.style.display = '';
      pp.style.display = 'flex'; pp.dataset.dbseat = p.dbSeat; av.dataset.dbseat = p.dbSeat;
    } else {
      // Empty seat: show placeholder in swap mode (for second-tap target), hide otherwise
      if (crown) crown.style.display = 'none';
      if (state.swapMode && state.swapFirstDbSeat) {
        // compute dbSeat for this view position so onclick works
        const dbSeat = viewSeatToDbSeat(vs);
        pp.style.display = 'flex';
        pp.dataset.dbseat = dbSeat;
        av.childNodes.forEach(n => { if (n.nodeType === 3) n.remove(); });
        av.style.opacity = '0.35';
        nm.style.display = 'none';
      } else {
        pp.style.display = 'none';
      }
    }
  });

  // ── Bench positions ──
  ['bench-left', 'bench-right'].forEach(bs => {
    const suf   = bs === 'bench-left' ? 'L' : 'R';
    const p     = state.players.find(pl => pl.dbSeat === bs);
    const pp    = document.getElementById('pp-bench-' + suf);
    const av    = document.getElementById('av-bench-' + suf);
    const nm    = document.getElementById('name-bench-' + suf);
    const sc    = document.getElementById('score-bench-' + suf);
    const badge = document.getElementById('bench-badge-' + suf);
    if (p) {
      av.textContent = p.emoji;
      nm.textContent = p.isMe ? p.name + '（我）' : p.name;
      if (p.isMe) { sc.textContent = p.score; sc.style.display = 'block'; av.className = 'av-bench av-bench-self'; }
      else         { sc.style.display = 'none';                              av.className = 'av-bench'; }
      if (badge) badge.textContent = p.isHost ? '👑 备战席' : '备战席';
      pp.style.display = 'flex'; pp.dataset.dbseat = bs; av.dataset.dbseat = bs;
    } else {
      pp.style.display = 'none';
    }
  });

  // ── Pool ──
  document.getElementById('pool-num').textContent = state.pool;

  // ── Bench follow bar ──
  const followBar = document.getElementById('bench-follow-bar');
  followBar.style.display = bench ? 'flex' : 'none';
  if (bench) {
    // Update button labels to show player names
    TABLE_CW.forEach(dbSeat => {
      const btn = followBar.querySelector(`[data-followseat="${dbSeat}"]`);
      if (!btn) return;
      const p = state.players.find(pl => pl.dbSeat === dbSeat);
      btn.textContent = p ? p.emoji : '空';
      btn.classList.toggle('active-follow', dbSeat === state.benchFollowDbSeat);
    });
  }

  // ── Swap mode btn visibility ──
  document.getElementById('swap-mode-btn').style.display = me?.isHost ? 'flex' : 'none';

  // ── Refresh swap highlights if mode is active ──
  if (state.swapMode) renderSwapMode();
}

// ═══════════════════════════════════════════════
// SWAP MODE (HOST ONLY)
// ═══════════════════════════════════════════════
function toggleSwapMode() {
  state.swapMode = !state.swapMode;
  state.swapFirstDbSeat = null;
  const btn = document.getElementById('swap-mode-btn');
  btn.textContent = state.swapMode ? '取消换座' : '换 座';
  btn.style.background = state.swapMode ? 'var(--brown)' : 'var(--gold)';
  btn.style.color      = state.swapMode ? 'var(--gold)'  : 'var(--brown)';
  // Clear all selection highlights
  document.querySelectorAll('.swap-selectable,.swap-selected').forEach(el => {
    el.classList.remove('swap-selectable','swap-selected');
  });
  document.getElementById('swap-mode-banner').style.display = state.swapMode ? 'flex' : 'none';
  if (state.swapMode) renderSwapMode();
}

function renderSwapMode() {
  document.getElementById('swap-banner-hint').textContent = state.swapFirstDbSeat
    ? '已选中，再点另一位确认换座（可选空位）' : '点击任意玩家选择换座';
  // Table positions: occupied = selectable always; empty = selectable only as second tap
  ['top','left','right'].forEach(vs => {
    const pp = document.getElementById('pp-' + vs);
    if (!pp || pp.style.display === 'none') return;
    const hasPlayer = !!state.players.find(pl => pl.dbSeat === pp.dataset.dbseat);
    // first tap: only players; second tap: players + empty slots
    if (hasPlayer || state.swapFirstDbSeat) {
      pp.classList.add('swap-selectable');
      pp.classList.toggle('swap-selected', !!pp.dataset.dbseat && pp.dataset.dbseat === state.swapFirstDbSeat);
    }
  });
  const ppBot = document.getElementById('pp-bottom');
  ppBot.classList.add('swap-selectable');
  ppBot.classList.toggle('swap-selected', ppBot.dataset.dbseat === state.swapFirstDbSeat);
  ['L','R'].forEach(s => {
    const pp = document.getElementById('pp-bench-' + s);
    if (pp && pp.dataset.dbseat) {
      pp.classList.add('swap-selectable');
      pp.classList.toggle('swap-selected', pp.dataset.dbseat === state.swapFirstDbSeat);
    }
  });
}

function handleSwapSelect(dbSeat) {
  const p = state.players.find(pl => pl.dbSeat === dbSeat);
  if (!state.swapFirstDbSeat) {
    if (!p) return;
    state.swapFirstDbSeat = dbSeat;
    renderSwapMode();
  } else if (state.swapFirstDbSeat === dbSeat) {
    state.swapFirstDbSeat = null;
    renderSwapMode();
  } else {
    const p1 = state.players.find(pl => pl.dbSeat === state.swapFirstDbSeat);
    const p2 = p;
    const n1 = p1 ? (p1.isMe ? p1.name+'（我）' : p1.name) : '？';
    const n2 = p2 ? (p2.isMe ? p2.name+'（我）' : p2.name) : '空位';
    document.getElementById('swap-av-self').textContent  = p1?.emoji ?? '·';
    document.getElementById('swap-av-other').textContent = p2?.emoji ?? '·';
    document.getElementById('swap-desc').textContent = `确认将「${n1}」和「${n2}」互换座位吗？`;
    state.pendingSwap = { from: state.swapFirstDbSeat, to: dbSeat };
    state.swapFirstDbSeat = null;
    document.getElementById('swap-confirm').classList.add('open');
  }
}

function cancelSwap() {
  state.pendingSwap = null;
  state.swapFirstDbSeat = null;
  document.getElementById('swap-confirm').classList.remove('open');
}

function confirmSwap() {
  if (!state.pendingSwap) return;
  const { from, to } = state.pendingSwap;
  const p1 = state.players.find(p => p.dbSeat === from);
  const p2 = state.players.find(p => p.dbSeat === to);
  if (p1 && p2) { p1.dbSeat = to; p2.dbSeat = from; }
  else if (p1)  { p1.dbSeat = to; }
  // Sync myDbSeat
  state.myDbSeat = getMe().dbSeat;
  // If bench follow target moved, follow it to its new seat
  if (state.benchFollowDbSeat === from && isTableSeat(to))  state.benchFollowDbSeat = to;
  else if (state.benchFollowDbSeat === to && isTableSeat(from)) state.benchFollowDbSeat = from;
  if (!isTableSeat(state.benchFollowDbSeat)) state.benchFollowDbSeat = 'bottom';
  state.pendingSwap = null;
  state.swapMode = false;
  // Reset swap button appearance
  const btn = document.getElementById('swap-mode-btn');
  btn.textContent = '换 座'; btn.style.background = 'var(--gold)'; btn.style.color = 'var(--brown)';
  document.getElementById('swap-mode-banner').style.display = 'none';
  document.querySelectorAll('.swap-selectable,.swap-selected').forEach(el => el.classList.remove('swap-selectable','swap-selected'));
  document.getElementById('swap-confirm').classList.remove('open');
  renderMain();
  showToast('换座成功');
}

// ═══════════════════════════════════════════════
// BENCH FOLLOW
// ═══════════════════════════════════════════════
function setBenchFollow(dbSeat) {
  if (!isTableSeat(dbSeat)) return;
  state.benchFollowDbSeat = dbSeat;
  // Update follow bar
  document.querySelectorAll('.follow-btn').forEach(btn => {
    const p = state.players.find(pl => pl.dbSeat === btn.dataset.followseat);
    btn.textContent = p?.emoji ?? '·';
    btn.classList.toggle('active-follow', btn.dataset.followseat === dbSeat);
  });
  renderMain();
}

// ═══════════════════════════════════════════════
// DEMO VIEW SWITCHER (PROTOTYPE ONLY)
// ═══════════════════════════════════════════════
function toggleViewSwitcher() {
  const el = document.getElementById('view-switcher');
  if (el.style.display === 'none') {
    // Rebuild list
    const list = document.getElementById('demo-player-list');
    list.innerHTML = '';
    state.players.forEach(p => {
      const btn = document.createElement('div');
      btn.className = 'demo-player-btn' + (p.isMe ? ' demo-me' : '');
      btn.onclick = () => switchDemoView(p.dbSeat);
      const isBench = BENCH_SEATS.includes(p.dbSeat);
      btn.innerHTML = `<span class="demo-av-ico">${p.emoji}</span>`
        + `<span class="demo-pname">${p.name}${p.isMe ? '（我）' : ''}</span>`
        + (isBench    ? `<span class="demo-bench-tag">备战</span>` : '')
        + (p.isHost   ? `<span class="demo-host-tag">房主</span>` : '');
      list.appendChild(btn);
    });
    el.style.display = 'block';
  } else {
    el.style.display = 'none';
  }
}

function switchDemoView(dbSeat) {
  const cur = getMe(); if (cur) cur.isMe = false;
  const next = state.players.find(p => p.dbSeat === dbSeat);
  if (!next) { if (cur) cur.isMe = true; return; }
  next.isMe = true;
  state.myDbSeat = dbSeat;
  if (BENCH_SEATS.includes(dbSeat)) {
    const avail = TABLE_CW.find(s => state.players.some(p => p.dbSeat === s));
    state.benchFollowDbSeat = avail || 'bottom';
  }
  document.getElementById('view-switcher').style.display = 'none';
  // Reset swap mode if switching view
  if (state.swapMode) toggleSwapMode();
  renderMain();
  showToast('视角：' + next.name);
}

// ═══════════════════════════════════════════════
// PLAYER TAP → TRANSFER or SWAP
// ═══════════════════════════════════════════════
function handlePlayerTap(viewSeat) {
  const dbSeat = viewSeatToDbSeat(viewSeat);
  if (!dbSeat) return;
  if (state.swapMode) {
    if (!getMe()?.isHost) return;
    handleSwapSelect(dbSeat);
    return;
  }
  const p = state.players.find(pl => pl.dbSeat === dbSeat);
  if (!p || p.isMe) return;
  state.transferTarget = dbSeat;
  document.getElementById('transfer-rec-av').textContent = p.emoji;
  document.getElementById('transfer-rec-name').textContent = p.name;
  document.getElementById('transfer-amount').value = '';
  document.getElementById('transfer-dir-hint').textContent = `你将付出多少分给 ${p.name}？`;
  openSheet('transfer');
}

function updateTransferHint() {
  const amt = parseInt(document.getElementById('transfer-amount').value) || 0;
  const target = state.players.find(p => p.dbSeat === state.transferTarget);
  if (!target) return;
  document.getElementById('transfer-dir-hint').textContent =
    amt > 0 ? `你将付出 ${amt} 分给 ${target.name}` : `你将付出多少分给 ${target.name}？`;
}

function confirmTransfer() {
  const amt = parseInt(document.getElementById('transfer-amount').value);
  if (!amt || amt <= 0) { showToast('请输入有效分数'); return; }
  const me = getMe();
  const target = state.players.find(p => p.dbSeat === state.transferTarget);
  if (!target) return;
  me.score -= amt;
  state.gameStarted = true;
  addHistory({ desc: `${me.name} → ${target.name}`, amt, selfDelta: -amt, type: 'transfer' });
  closeSheet('transfer');
  renderMain();
  showToast('转账成功');
}

// ═══════════════════════════════════════════════
// POOL ACTIONS
// ═══════════════════════════════════════════════
function openPoolSheet() {
  document.getElementById('pool-sheet-num').textContent = state.pool;
  const collectBtn = document.getElementById('pool-collect-btn');
  const bench = isBenchViewer();
  if (bench) {
    collectBtn.className = 'pool-btn pool-btn-disabled';
    collectBtn.disabled = true;
    collectBtn.textContent = '备战席不可收公池';
  } else if (state.pool <= 0) {
    collectBtn.className = 'pool-btn pool-btn-disabled';
    collectBtn.disabled = true;
    collectBtn.innerHTML = '收公池（+<span id="pool-collect-amt">0</span>分）';
  } else {
    collectBtn.className = 'pool-btn pool-btn-collect';
    collectBtn.disabled = false;
    collectBtn.innerHTML = `收公池（+<span id="pool-collect-amt">${state.pool}</span>分）`;
  }
}

function poolAction(action) {
  const me = getMe();
  if (action === 'pay') {
    me.score -= 1;
    state.pool += 1;
    addHistory({ desc: `${me.name} 交公池`, amt: 1, selfDelta: -1, type: 'pool-pay' });
    showToast('已交1分到公池');
  } else if (action === 'collect') {
    if (isBenchViewer()) { showToast('备战席玩家不可收公池'); return; }
    if (state.pool <= 0) return;
    const amt = state.pool;
    me.score += amt;
    state.pool = 0;
    addHistory({ desc: `${me.name} 收公池`, amt, selfDelta: +amt, type: 'pool-collect' });
    showToast(`收到公池 ${amt} 分`);
  }
  state.gameStarted = true;
  closeSheet('pool');
  renderMain();
}

// ═══════════════════════════════════════════════
// HISTORY
// ═══════════════════════════════════════════════
let histId = 0;
function addHistory(entry) { entry.id = ++histId; state.history.unshift(entry); }

function openHistorySheet() {
  const list = document.getElementById('hist-list');
  if (state.history.length === 0) {
    list.innerHTML = '<div class="hist-empty">暂无记录</div>';
    return;
  }
  list.innerHTML = '';
  state.history.forEach(item => {
    const row = document.createElement('div');
    row.className = 'hist-item';

    const isRevoke = item.type === 'revoke';
    const isRevoked = item.revoked;

    let amtClass = 'ha-pool';
    if (isRevoke) amtClass = 'ha-gray';
    else if (item.type === 'transfer') amtClass = item.selfDelta < 0 ? 'ha-neg' : 'ha-pos';
    else if (item.type === 'pool-pay') amtClass = 'ha-neg';
    else if (item.type === 'pool-collect') amtClass = 'ha-pos';

    const amtSign = item.selfDelta >= 0 ? '+' : '-';
    const descStyle = (isRevoke || isRevoked) ? 'color:var(--gray-dis);' : '';
    const revokeCol = (!isRevoke && !isRevoked)
      ? `<button class="revoke-btn" onclick="revokeHistory(${item.id})">撤回</button>`
      : `<span style="font-size:11px;color:var(--gray-dis);margin-left:8px;white-space:nowrap;">${isRevoked ? '已撤回' : ''}</span>`;

    row.innerHTML = `
      <span class="hist-desc" style="${descStyle}">${item.desc}</span>
      <span class="hist-amt ${amtClass}" style="${isRevoke || isRevoked ? 'opacity:0.45;' : ''}">${amtSign}${item.amt}</span>
      ${revokeCol}
    `;
    list.appendChild(row);
  });
}

function revokeHistory(id) {
  state.pendingConfirm = {
    title: '撤回确认',
    msg: '确认撤回这条记录吗？该操作会还原对应分数变动。',
    action: () => doRevoke(id),
  };
  openConfirm();
}

function doRevoke(id) {
  const idx = state.history.findIndex(h => h.id === id);
  if (idx === -1) return;
  const item = state.history[idx];

  // Mark original as revoked (no longer revokable)
  item.revoked = true;

  // Reverse scores
  const me = getMe();
  if (me) me.score -= item.selfDelta;
  if (item.type === 'pool-pay') state.pool -= 1;
  if (item.type === 'pool-collect') state.pool += item.amt;

  // Add a new revoke record at the top
  addHistory({
    desc: `【撤回】${item.desc}`,
    amt: item.amt,
    selfDelta: -item.selfDelta,
    type: 'revoke',
  });

  closeSheet('history');
  renderMain();
  showToast('已撤回');
}

// ═══════════════════════════════════════════════
// SETTINGS
// ═══════════════════════════════════════════════
function updateInitScore() {
  const val = parseInt(document.getElementById('setting-init-score').value);
  if (!isNaN(val)) state.initScore = val;
}

function openSettingsSheet() {
  const hostEl = document.getElementById('host-settings');
  hostEl.style.display = getMe()?.isHost ? 'block' : 'none';
  if (getMe()?.isHost) {
    document.getElementById('setting-init-score').value = state.initScore;
    buildKickList();
  }
  openSheet('settings');
}

function confirmLeave() {
  const me = getMe();
  const others = state.players.filter(p => !p.isMe);
  let msg;
  if (me.isHost && others.length === 0) msg = '你是唯一的玩家，退出后房间将自动解散。确认退出吗？';
  else if (me.isHost) msg = `你是房主，退出后「${others[0].name}」将成为新房主。确认退出吗？`;
  else msg = '确认退出当前房间吗？';
  state.pendingConfirm = { title: '退出房间', msg, action: doLeave };
  openConfirm();
}

function doLeave() {
  const me = getMe();
  const others = state.players.filter(p => !p.isMe);
  if (me.isHost && others.length === 0) { doDissolve(); return; }
  if (me.isHost && others.length > 0) { others[0].isHost = true; showToast(`${others[0].name} 成为新房主`); }
  _resetState();
  closeSheet('settings');
  resetEntry();
  showPage('page-entry');
}

function buildKickList() {
  const list = document.getElementById('kick-list');
  list.innerHTML = '';
  const others = state.players.filter(p => !p.isMe);
  if (others.length === 0) {
    list.innerHTML = '<div style="font-size:13px;color:var(--text-light);padding:6px 0;">暂无其他玩家</div>';
    return;
  }
  others.forEach(p => {
    const row = document.createElement('div');
    row.className = 'kick-item';
    row.innerHTML = `
      <div class="kick-av">${p.emoji}</div>
      <div class="kick-name">${p.name}</div>
      <button class="kick-btn" onclick="confirmKick('${p.dbSeat}')">踢出</button>
    `;
    list.appendChild(row);
  });
}

function confirmKick(dbSeat) {
  const p = state.players.find(pl => pl.dbSeat === dbSeat);
  if (!p) return;
  state.pendingConfirm = {
    title: '踢出玩家',
    msg: `确认将「${p.name}」踢出房间吗？`,
    action: () => doKick(dbSeat),
  };
  openConfirm();
}

function doKick(dbSeat) {
  state.players = state.players.filter(p => p.dbSeat !== dbSeat);
  closeSheet('settings');
  renderMain();
  showToast('已踢出玩家');
}

function confirmReset() {
  state.pendingConfirm = {
    title: '重置房间',
    msg: '所有玩家分数将重置为初始分数，交易记录清空。确认重置吗？',
    action: doReset,
  };
  openConfirm();
}

function doReset() {
  state.players.forEach(p => { p.score = state.initScore; });
  state.pool = 0;
  state.history = [];
  state.gameStarted = false;
  closeSheet('settings');
  renderMain();
  showToast('房间已重置');
}

function confirmDissolve() {
  state.pendingConfirm = {
    title: '解散房间',
    msg: '解散后所有数据将清除，所有玩家将退出房间。确认解散吗？',
    action: doDissolve,
  };
  openConfirm();
}

function doDissolve() {
  _resetState();
  closeSheet('settings');
  showPage('page-entry');
  showToast('房间已解散');
}

function _resetState() {
  Object.assign(state, {
    roomCode: '', initScore: 200, gameStarted: false, pool: 0,
    players: [], myDbSeat: 'bottom', benchFollowDbSeat: 'bottom',
    swapMode: false, swapFirstDbSeat: null,
    self: { name: '', emoji: '🍡' },
    history: [], transferTarget: null, pendingConfirm: null, pendingSwap: null,
  });
  resetEntry();
}

// ═══════════════════════════════════════════════
// SHEETS
// ═══════════════════════════════════════════════
function openSheet(name) {
  if (name === 'pool') openPoolSheet();
  if (name === 'history') openHistorySheet();

  const el = document.getElementById('sheet-' + name);
  if (!el) return;
  el.classList.add('open');
}

function closeSheet(name) {
  const el = document.getElementById('sheet-' + name);
  if (!el) return;
  el.classList.remove('open');
}

// ═══════════════════════════════════════════════
// CONFIRM DIALOG
// ═══════════════════════════════════════════════
function openConfirm() {
  const d = state.pendingConfirm;
  if (!d) return;
  document.getElementById('confirm-title').textContent = d.title;
  document.getElementById('confirm-msg').textContent = d.msg;
  document.getElementById('confirm-dialog').classList.add('open');
}

function closeConfirm() {
  state.pendingConfirm = null;
  document.getElementById('confirm-dialog').classList.remove('open');
}

function executeConfirm() {
  if (state.pendingConfirm?.action) state.pendingConfirm.action();
  closeConfirm();
}

// ═══════════════════════════════════════════════
// TOAST
// ═══════════════════════════════════════════════
let toastTimer;
function showToast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => el.classList.remove('show'), 1800);
}

// ═══════════════════════════════════════════════
// INIT — keyboard on entry page
// ═══════════════════════════════════════════════
const roomInput = document.getElementById('room-code-input');
roomInput.addEventListener('input', () => {
  roomInput.value = roomInput.value.replace(/\D/g, '').slice(0, 4);
});
roomInput.addEventListener('keydown', e => {
  if (e.key === 'Enter') confirmRoom();
});
document.getElementById('name-input').addEventListener('keydown', e => {
  if (e.key === 'Enter') {
    const val = document.getElementById('name-input').value.trim();
    if (val) enterIdentity();
  }
});
</script>
